server:
  port: 8080

spring:
  application:
    name: drt-ops-api
  datasource:
    url: ${DRT_OPS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/drt_ops}
    username: ${DRT_OPS_DATASOURCE_USERNAME:drt_ops}
    password: ${DRT_OPS_DATASOURCE_PASSWORD:drt_ops}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

drt:
  map:
    amap:
      enabled: ${DRT_AMAP_ENABLED:false}
      web-service-key: ${DRT_AMAP_WEB_SERVICE_KEY:}
      base-url: ${DRT_AMAP_BASE_URL:https://restapi.amap.com}
      connect-timeout-ms: ${DRT_AMAP_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${DRT_AMAP_READ_TIMEOUT_MS:5000}
  auth:
    jwt-secret: ${DRT_AUTH_JWT_SECRET:}
    access-token-minutes: 15
    refresh-token-days: 7
    bootstrap-admin-username: ${DRT_AUTH_BOOTSTRAP_ADMIN_USERNAME:}
    bootstrap-admin-password: ${DRT_AUTH_BOOTSTRAP_ADMIN_PASSWORD:}
    refresh-cookie-secure: ${DRT_AUTH_REFRESH_COOKIE_SECURE:true}
